<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>봉사활동 성찰 일지</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 480px; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1c1e21; margin-bottom: 8px; font-size: 24px; }
        p.subtitle { text-align: center; color: #6c757d; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #4b4f56; }
        input, textarea, select { width: 100%; padding: 12px 16px; border: 1px solid #dddfe2; border-radius: 8px; box-sizing: border-box; font-size: 15px; background-color: #f5f6f7; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); background-color: white; outline: none; box-shadow: 0 0 0 2px rgba(0,123,255,0.2); }
        button { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background-color: #0069d9; }
        button:disabled { background-color: #cbd5e0; }
        #hidden_iframe { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>봉사활동 성찰 일지</h2>
    <p class="subtitle">입력하신 내용은 구글 설문지로 전송됩니다.</p>
    
    <form id="reflectionForm" 
          action="https://docs.google.com/forms/d/e/1FAIpQLScBkxcqiLOjap2CVJ0mx2vfbwbkBYJdluEvzAIQC64y99Ui0A/formResponse" 
          method="POST" 
          target="hidden_iframe">
        
        <div class="form-group">
            <label>학번 및 이름</label>
            <input type="text" name="entry.1239988557" placeholder="예: 20101 홍길동" required>
        </div>

        <div class="form-group">
            <label>활동 차시</label>
            <select name="entry.1224377133" id="session_round" required>
                <option value="" disabled selected>차시를 선택하세요</option>
            </select>
        </div>

        <div class="form-group">
            <label>주요 활동 요약</label>
            <input type="text" name="entry.606864464" placeholder="오늘 어떤 활동을 했나요?" required>
        </div>

        <div class="form-group">
            <label>핵심 키워드</label>
            <input type="text" name="entry.411286149" placeholder="나눔, 협력, 성장 등">
        </div>

        <div class="form-group">
            <label>상세 성찰 소감</label>
            <textarea name="entry.1103846082" rows="4" placeholder="배운 점이나 느낀 점을 자유롭게 적어주세요."></textarea>
        </div>

        <button type="submit" id="submitBtn">기록 제출하기</button>
    </form>
</div>

<script type="text/javascript">var submitted=false;</script>
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" 
        onload="if(submitted) {alert('제출이 완료되었습니다!'); window.location.reload();}"></iframe>

<script>
    // 차시 목록 생성
    const select = document.getElementById('session_round');
    for (let i = 1; i <= 10; i++) {
        const opt = document.createElement('option');
        opt.value = i + "차시";
        opt.textContent = i + "차시 활동";
        select.appendChild(opt);
    }

    // 제출 이벤트 처리
    const form = document.getElementById('reflectionForm');
    form.onsubmit = function() {
        submitted = true;
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerHTML = "전송 중...";
        return true;
    };
</script>

</body>
</html>
