<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 분양 활동 성찰일지</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; padding: 20px; min-height: 100vh; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); width: 100%; max-width: 550px; border-top: 8px solid #4285f4; }
        h2 { color: #202124; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #3c4043; font-size: 15px; }
        .sub-label { display: block; font-size: 12px; color: #1a73e8; margin-bottom: 8px; font-weight: normal; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border: 2px solid #4285f4; }
        button { width: 100%; padding: 15px; background-color: #4285f4; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #174ea6; }
        #hidden_iframe { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 게시판 분양 성찰일지</h2>
    
    <iframe name="hidden_iframe" id="hidden_iframe" onload="if(submitted) {alert('성공적으로 제출되었습니다!'); location.reload();}"></iframe>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLScHB0lyynWHs5IHMhwKR6qcwGBpfBxVd4ZEp0boffPKFt3qKg/formResponse" 
          method="POST" 
          target="hidden_iframe" 
          onsubmit="submitted=true;">

        <div class="form-group">
            <label>학번 및 이름</label>
            <input type="text" name="entry.772550695" placeholder="예: 20101 홍길동" required>
        </div>

        <div class="form-group">
            <label>활동 차시 선택</label>
            <select name="entry.1210211204" required>
                <option value="" disabled selected>회차를 선택하세요</option>
                <option value="1회차">1회차</option>
                <option value="2회차">2회차</option>
                <option value="3회차">3회차</option>
                <option value="4회차">4회차</option>
                <option value="5회차">5회차</option>
            </select>
        </div>

        <div class="form-group">
            <label>분양 구역 선택</label>
            <select name="entry.1240044122" required>
                <option value="" disabled selected>본인의 구역을 선택하세요</option>
                <option value="공유지 쉼터">공유지 쉼터</option>
                <option value="러닝허브">러닝허브</option>
                <option value="싱크탱크">싱크탱크</option>
                <option value="월드와이드">월드와이드</option>
                <option value="인사이트 서재">인사이트 서재</option>
                <option value="커리어캔버스">커리어캔버스</option>
                <option value="아고라">아고라</option>
            </select>
        </div>

        <div class="form-group">
            <label>오늘의 활동 내용</label>
            <span class="sub-label">💡 무엇을 했는가? (객관적인 사실 위주로 기록)</span>
            <input type="text" name="entry.937188258" placeholder="예: 게시판 청소 및 도서 목록 업데이트" required>
        </div>

        <div class="form-group">
            <label>성찰 및 느낀 점</label>
            <span class="sub-label">💡 무엇을 느꼈거나 배웠는가? (자신의 생각 기록)</span>
            <textarea name="entry.1646722086" rows="5" placeholder="활동을 통해 새롭게 알게 된 점이나 느낀 점을 자유롭게 적어주세요." required></textarea>
        </div>

        <button type="submit">성찰일지 제출하기</button>
    </form>
</div>

<script>
    let submitted = false;
</script>

</body>
</html>
