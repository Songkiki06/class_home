<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동아리 활동일지 제출 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background-color: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 550px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h2 { color: #1a73e8; text-align: center; border-bottom: 2px solid #e8f0fe; padding-bottom: 15px; margin-top: 0; }
        .section { margin-top: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #1a73e8; }
        .desc { font-size: 0.85em; color: #666; margin-bottom: 10px; line-height: 1.4; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        input:focus, textarea:focus { border-color: #1a73e8; outline: none; background-color: #f8fbff; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; padding: 16px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        button:hover { background-color: #1765cc; box-shadow: 0 2px 8px rgba(26,115,232,0.3); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #statusMsg { text-align: center; margin-top: 15px; font-weight: bold; color: #1a73e8; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h2>동아리 활동일지</h2>
        
        <div class="section">
            <label>활동 날짜</label>
            <input type="date" id="dateInput">
        </div>

        <div class="section">
            <label>학번 및 이름</label>
            <input type="text" id="idInput" placeholder="학번 (예: 20101)" style="margin-bottom: 10px;">
            <input type="text" id="nameInput" placeholder="이름">
        </div>

        <div class="section">
            <label>1. 오늘의 활동 목표</label>
            <p class="desc">오늘 우리 동아리(또는 나)가 달성하고자 한 구체적인 목표는 무엇인가요?</p>
            <textarea id="goalInput"></textarea>
        </div>

        <div class="section">
            <label>2. 주요 활동 과정 (What I Did)</label>
            <p class="desc">단계별 과정과 본인이 구체적으로 맡았던 업무(역할)를 적어주세요.</p>
            <textarea id="processInput"></textarea>
        </div>

        <div class="section">
            <label>3. 핵심 내용 및 결과 (Key Findings)</label>
            <p class="desc">도출된 결론, 데이터, 또는 완성된 결과물의 핵심 요약</p>
            <textarea id="resultInput"></textarea>
        </div>

        <div class="section">
            <label>4. 성찰 및 성장 (Growth & Insight)</label>
            <p class="desc">배운 점, 어려움 해결 과정, 오늘 나의 몰입도 등</p>
            <textarea id="insightInput"></textarea>
        </div>

        <div class="section">
            <label>5. 다음 시간 연결 고리 (Next Step)</label>
            <p class="desc">해결하지 못한 궁금증이나 다음 시간 후속 활동 계획</p>
            <textarea id="nextInput"></textarea>
        </div>

        <button id="submitBtn" onclick="sendData()">활동일지 제출하기</button>
        <div id="statusMsg"></div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script>
        const FORM_ACTION_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdW05trqJcNXK6sChUSQpEHa4Dt2NFH_IP-4rgrD_ooEnWvgw/formResponse";

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateInput').value = today;
        };

        function sendData() {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');
            
            // [수정됨] 날짜와 학번의 entry ID를 서로 바꾸었습니다.
            const fields = {
                "entry.702667613": document.getElementById('dateInput').value,    // 날짜 입력
                "entry.1554958339": document.getElementById('idInput').value.trim(), // 학번 입력
                "entry.1733007318": document.getElementById('nameInput').value.trim(),
                "entry.1605454970": document.getElementById('goalInput').value.trim(),
                "entry.572830936": document.getElementById('processInput').value.trim(),
                "entry.1891153261": document.getElementById('resultInput').value.trim(),
                "entry.1774381118": document.getElementById('insightInput').value.trim(),
                "entry.270426395": document.getElementById('nextInput').value.trim()
            };

            if(!fields["entry.1554958339"] || !fields["entry.1733007318"]) {
                alert("학번과 이름은 꼭 입력해 주세요!");
                return;
            }

            btn.disabled = true;
            status.innerText = "데이터를 전송하고 있습니다...";

            const form = document.createElement('form');
            form.action = FORM_ACTION_URL;
            form.method = "POST";
            form.target = "hidden_iframe";

            for (let key in fields) {
                const input = document.createElement('input');
                input.type = "hidden";
                input.name = key;
                input.value = fields[key];
                form.appendChild(input);
            }

            document.body.appendChild(form);
            form.submit();

            setTimeout(() => {
                alert("활동일지가 성공적으로 제출되었습니다!");
                const textAreas = document.querySelectorAll('textarea');
                textAreas.forEach(ta => ta.value = "");
                
                btn.disabled = false;
                status.innerText = "";
                document.body.removeChild(form);
            }, 1500);
        }
    </script>
</body>
</html>
