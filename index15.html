<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정밀 내신 환산기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 750px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 5px; }
        .ver-tag { display: block; text-align: center; color: #2563eb; font-weight: bold; font-size: 0.85rem; margin-bottom: 25px; }
        
        .user-info { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; padding: 15px; background: #f8fafc; border-radius: 12px; }
        .info-input { width: 120px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.9rem; }
        th { background: #f8fafc; color: #475569; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 8px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .sub-name { font-weight: 600; color: #334155; text-align: left; padding-left: 10px; }
        
        input { width: 45px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; font-size: 0.95rem; }
        .btn-calc { width: 100%; padding: 18px; background: #1e293b; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        #result-box { margin-top: 30px; padding: 25px; border-radius: 15px; display: none; background: #fff; border: 2px solid #1e293b; }
        .result-grid { display: flex; gap: 15px; margin-top: 15px; }
        .result-card { flex: 1; padding: 15px; border-radius: 10px; text-align: center; }
        .card-label { font-size: 0.85rem; color: #64748b; margin-bottom: 5px; }
        .card-val { font-size: 2.2rem; font-weight: 900; }
        .comparison-info { font-size: 0.85rem; color: #64748b; margin-top: 15px; border-top: 1px dashed #eee; padding-top: 15px; line-height: 1.6; }
        .highlight { color: #e11d48; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 정밀 내신 환산기</h2>
    <span class="ver-tag">5등급제 평균(기존 방식) + 9등급제 환산(자료 기준)</span>
    
    <div class="user-info">
        <input type="text" id="userNo" class="info-input" placeholder="학번">
        <input type="text" id="userName" class="info-input" placeholder="성명">
    </div>
    
    <table>
        <thead>
            <tr>
                <th rowspan="2">과목명</th>
                <th rowspan="2">단위</th>
                <th colspan="2">1학기</th>
                <th colspan="2">2학기</th>
            </tr>
            <tr>
                <th>등급</th>
                <th>점수(참고용)</th>
                <th>등급</th>
                <th>점수(참고용)</th>
            </tr>
        </thead>
        <tbody id="inputBody">
            <script>
                const subjects = ["국어", "수학", "영어", "한국사", "통합사회", "통합과학"];
                subjects.forEach(s => {
                    document.write(`
                        <tr>
                            <td class="sub-name">${s}</td>
                            <td><input type="number" class="u" value="4"></td>
                            <td><input type="number" class="g1" placeholder="1-5"></td>
                            <td><input type="number" class="s1" placeholder="0-100"></td>
                            <td><input type="number" class="g2" placeholder="1-5"></td>
                            <td><input type="number" class="s2" placeholder="0-100"></td>
                        </tr>
                    `);
                });
            </script>
        </tbody>
    </table>

    <button class="btn-calc" onclick="calculate()">성적 환산하기</button>

    <div id="result-box">
        <div id="userDisplay" style="text-align:center; font-weight:bold; margin-bottom:10px;"></div>
        <div class="result-grid">
            <div class="result-card" style="background: #eff6ff;">
                <div class="card-label">현행 5등급제 평균</div>
                <div class="card-val" id="g5Out" style="color: #2563eb;">0.00</div>
            </div>
            <div class="result-card" style="background: #fff1f2;">
                <div class="card-label">환산 9등급제</div>
                <div class="card-val" id="g9Out" style="color: #e11d48;">0.00</div>
            </div>
        </div>
        <div class="comparison-info" id="mainAnalysis"></div>
    </div>
</div>

<script>
    // 이미지 자료 기반 변환 데이터 테이블
    const convertTable = [
        {g5: 1.0, g9: 1.00}, {g5: 1.1, g9: 1.77}, {g5: 1.2, g9: 1.93}, {g5: 1.3, g9: 2.10},
        {g5: 1.4, g9: 2.27}, {g5: 1.5, g9: 2.44}, {g5: 1.6, g9: 2.61}, {g5: 1.8, g9: 2.94},
        {g5: 2.0, g9: 3.28}, {g5: 2.2, g9: 3.61}, {g5: 2.4, g9: 3.95}, {g5: 2.6, g9: 4.29},
        {g5: 2.8, g9: 4.62}, {g5: 3.0, g9: 4.96}, {g5: 3.2, g9: 5.29}, {g5: 3.4, g9: 5.63},
        {g5: 3.6, g9: 5.96}, {g5: 3.8, g9: 6.30}, {g5: 4.0, g9: 6.64}, {g5: 4.2, g9: 6.97},
        {g5: 4.4, g9: 7.31}, {g5: 4.6, g9: 7.64}, {g5: 4.8, g9: 7.98}, {g5: 5.0, g9: 8.32}
    ];

    function calculate() {
        const us = document.querySelectorAll(".u");
        const g1s = document.querySelectorAll(".g1"), g2s = document.querySelectorAll(".g2");
        
        let totalWeightedGrade = 0, totalUnits = 0;

        for (let i = 0; i < us.length; i++) {
            const u = parseFloat(us[i].value);
            [g1s[i], g2s[i]].forEach(gInput => {
                const g = parseFloat(gInput.value);
                if (!isNaN(g)) {
                    totalWeightedGrade += (u * g);
                    totalUnits += u;
                }
            });
        }

        if (totalUnits === 0) return alert("등급을 입력해주세요.");

        // 1. 5등급제 평균 (단순 단위수 가중평균 - 이전 코드 방식)
        const avg5 = totalWeightedGrade / totalUnits;

        // 2. 9등급제 환산 (자료 기반 보간법)
        let avg9 = 9.0;
        if (avg5 <= 1.0) {
            avg9 = 1.00;
        } else if (avg5 >= 5.0) {
            avg9 = 8.32;
        } else {
            for (let i = 0; i < convertTable.length - 1; i++) {
                const low = convertTable[i];
                const high = convertTable[i+1];
                if (avg5 >= low.g5 && avg5 <= high.g5) {
                    const ratio = (avg5 - low.g5) / (high.g5 - low.g5);
                    avg9 = low.g9 + ratio * (high.g9 - low.g9);
                    break;
                }
            }
        }

        // 출력
        document.getElementById("result-box").style.display = "block";
        document.getElementById("userDisplay").innerText = document.getElementById("userName").value + " 학생 성적 환산 리포트";
        document.getElementById("g5Out").innerText = avg5.toFixed(2);
        document.getElementById("g9Out").innerText = avg9.toFixed(2);
        document.getElementById("mainAnalysis").innerHTML = 
            `입력하신 5등급제 평균 <span class="highlight">${avg5.toFixed(2)}</span>등급은 제공된 변환표 자료에 따라 9등급제 <span class="highlight">${avg9.toFixed(2)}</span>등급으로 산출되었습니다.`;

        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
