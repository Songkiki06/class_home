<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내신 성적 기반 정밀 환산기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 750px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 5px; }
        .ver-tag { display: block; text-align: center; color: #2563eb; font-weight: bold; font-size: 0.9rem; margin-bottom: 25px; }
        
        /* 인적사항 입력 스타일 */
        .user-info { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; padding: 15px; background: #f8fafc; border-radius: 12px; }
        .info-input { width: 120px !important; padding: 10px !important; border: 1px solid #cbd5e1 !important; border-radius: 6px; font-size: 0.9rem; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.9rem; }
        th { background: #f8fafc; color: #475569; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 8px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .sub-name { font-weight: 600; color: #334155; text-align: left; padding-left: 10px; }
        
        input { width: 45px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; font-size: 0.95rem; }
        input:focus { border-color: #2563eb; outline: none; background: #f0f7ff; }
        
        .btn-calc { width: 100%; padding: 18px; background: #1e293b; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-calc:hover { background: #334155; }

        #result-box { margin-top: 30px; padding: 25px; border-radius: 15px; display: none; background: #fff; border: 2px solid #1e293b; }
        .pct-box { margin-bottom: 15px; font-size: 1.1rem; font-weight: 700; color: #e11d48; text-align: center; }
        .user-display { text-align: center; font-size: 1.1rem; font-weight: bold; color: #1e293b; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        
        .result-grid { display: flex; gap: 15px; margin-top: 15px; }
        .result-card { flex: 1; padding: 15px; border-radius: 10px; text-align: center; }
        .card-label { font-size: 0.85rem; color: #64748b; margin-bottom: 5px; }
        .card-val { font-size: 2.2rem; font-weight: 900; }
        
        .comparison-info { font-size: 0.85rem; color: #64748b; margin-top: 15px; line-height: 1.5; border-top: 1px dashed #eee; padding-top: 15px; text-align: left; }
        .highlight { color: #2563eb; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 성적 반영형 등급 환산기</h2>
    <span class="ver-tag">5등급제 등급 + 원점수 기반 정밀 비교</span>
    
    <div class="user-info">
        <input type="text" id="userNo" class="info-input" placeholder="학번 (예: 20101)">
        <input type="text" id="userName" class="info-input" placeholder="성명">
    </div>
    
    <table>
        <thead>
            <tr>
                <th rowspan="2">과목명</th>
                <th rowspan="2">단위</th>
                <th colspan="2">1학기</th>
                <th colspan="2">2학기</th>
            </tr>
            <tr>
                <th>등급</th>
                <th>점수</th>
                <th>등급</th>
                <th>점수</th>
            </tr>
        </thead>
        <tbody>
            <script>
                const subjects = ["국어", "수학", "영어", "한국사", "통합사회", "통합과학"];
                subjects.forEach(s => {
                    document.write(`
                        <tr>
                            <td class="sub-name">${s}</td>
                            <td><input type="number" class="u" value="4"></td>
                            <td><input type="number" class="g1" placeholder="1-5"></td>
                            <td><input type="number" class="s1" placeholder="0-100"></td>
                            <td><input type="number" class="g2" placeholder="1-5"></td>
                            <td><input type="number" class="s2" placeholder="0-100"></td>
                        </tr>
                    `);
                });
            </script>
        </tbody>
    </table>

    <button class="btn-calc" onclick="calculate()">정밀 환산 결과 분석</button>

    <div id="result-box">
        <div class="user-display" id="userDisplay"></div>
        
        <div class="pct-box">종합 예상 상위 약 <span id="pctOut">0</span>%</div>
        
        <div class="result-grid">
            <div class="result-card" style="background: #eff6ff;">
                <div class="card-label">현행 (5등급제 평균)</div>
                <div class="card-val" id="g5Out" style="color: #2563eb;">0.00</div>
            </div>
            <div class="result-card" style="background: #fff1f2;">
                <div class="card-label">환산 (9등급제 예측)</div>
                <div class="card-val" id="g9Out" style="color: #e11d48;">0.00</div>
            </div>
        </div>
        
        <div class="comparison-info">
            <p id="mainAnalysis"></p>
            <p>* <b>환산 원리:</b> 입력한 원점수를 바탕으로 각 등급 내에서의 위치를 추정합니다. 같은 1등급이라도 점수가 100점에 가까울수록 9등급제 1.0에 수렴하도록 보정되었습니다.</p>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const userNo = document.getElementById("userNo").value;
        const userName = document.getElementById("userName").value;

        const us = document.querySelectorAll(".u");
        const g1s = document.querySelectorAll(".g1"), s1s = document.querySelectorAll(".s1");
        const g2s = document.querySelectorAll(".g2"), s2s = document.querySelectorAll(".s2");
        
        let totalScore5 = 0, totalUnits = 0, totalWeightedPct = 0;

        for (let i = 0; i < us.length; i++) {
            const u = parseFloat(us[i].value);
            [[g1s[i], s1s[i]], [g2s[i], s2s[i]]].forEach(pair => {
                const g = parseFloat(pair[0].value);
                const s = parseFloat(pair[1].value);
                
                if (!isNaN(g)) {
                    totalScore5 += (u * g);
                    totalUnits += u;
                    const cuts = [0, 0, 10, 34, 66, 90, 100];
                    const startPct = cuts[g];
                    const endPct = cuts[g+1];
                    const range = endPct - startPct;
                    const score = isNaN(s) ? 85 : s;
                    const scoreFactor = (100 - score) / 100;
                    const estimatedPct = startPct + (range * scoreFactor);
                    totalWeightedPct += (u * estimatedPct);
                }
            });
        }

        if (totalUnits === 0) return alert("등급 정보를 입력해주세요.");

        const avg5 = totalScore5 / totalUnits;
        const avgPct = totalWeightedPct / totalUnits;
        const cut9 = [{g:1,p:4}, {g:2,p:11}, {g:3,p:23}, {g:4,p:40}, {g:5,p:60}, {g:6,p:77}, {g:7,p:89}, {g:8,p:96}, {g:9,p:100}];
        let avg9 = 9;
        
        if (avgPct <= 4) {
            avg9 = 1.0 + (avgPct / 4) * 0.1;
            if (avgPct < 0.5) avg9 = 1.00; 
        } else {
            for (let i = 0; i < cut9.length - 1; i++) {
                if (avgPct <= cut9[i+1].p) {
                    const p1 = cut9[i].p, p2 = cut9[i+1].p, g1 = cut9[i].g, g2 = cut9[i+1].g;
                    avg9 = g1 + (avgPct - p1) / (p2 - p1) * (g2 - g1);
                    break;
                }
            }
        }

        // 결과창 표시 및 정보 매핑
        document.getElementById("result-box").style.display = "block";
        document.getElementById("userDisplay").innerText = (userNo || userName) ? `${userNo} ${userName} 학생 환산 결과` : "내신 환산 결과";
        document.getElementById("pctOut").innerText = avgPct.toFixed(2);
        document.getElementById("g5Out").innerText = avg5.toFixed(2);
        document.getElementById("g9Out").innerText = avg9.toFixed(2);
        
        const analysis = document.getElementById("mainAnalysis");
        analysis.innerHTML = `현재 5등급제 <span class="highlight">${avg5.toFixed(2)}등급</span>(원점수 반영)은 9등급제 기준으로 환산 시 <span class="highlight">${avg9.toFixed(2)}등급</span> 수준의 경쟁력을 가집니다.`;

        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
