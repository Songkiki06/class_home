<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물꼬방 통합 추천도서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            -webkit-font-smoothing: antialiased;
        }

        .category-chip {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-chip.active {
            background-color: #1e293b;
            color: white;
            border-color: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .info-card {
            background-color: #f0f4ff;
            border-radius: 1.5rem;
        }

        .book-card {
            transition: all 0.3s ease;
        }
        
        .book-card:hover {
            transform: translateY(-4px);
        }

        .is-lit {
            border-left: 4px solid #3b82f6;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="max-w-4xl mx-auto bg-white min-h-screen shadow-2xl overflow-x-hidden">

    <!-- Header Section -->
    <header class="p-6 md:p-10 pb-4 sticky top-0 bg-white/80 backdrop-blur-md z-30 border-b border-slate-100">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-100">
                    <i class="fas fa-book-open text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-900 leading-tight tracking-tight">물꼬방 통합 추천도서</h1>
                    <p class="text-xs text-blue-600 font-bold mt-1 tracking-wider uppercase">8대 핵심 분야 연계 도서관</p>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="relative flex-1 max-w-md">
                <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" 
                       id="searchInput"
                       oninput="filterBooks()"
                       placeholder="도서명, 저자, 키워드 검색" 
                       class="w-full py-3.5 pl-12 pr-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all shadow-sm">
            </div>
        </div>
    </header>

    <main class="p-6 md:p-10">
        <!-- Info Announcement Card -->
        <div class="info-card p-6 flex gap-5 items-start mb-12 shadow-sm border border-blue-50">
            <div class="flex-shrink-0 w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm">
                <i class="fas fa-info text-blue-500 text-lg"></i>
            </div>
            <div class="text-[13.5px] leading-relaxed text-slate-700">
                <h2 class="font-bold text-slate-900 mb-2 text-base">카테고리 개편 및 통합 안내</h2>
                <p>도서 탐색의 편의를 위해 전체 분야를 <span class="text-blue-600 font-bold underline underline-offset-4">8가지 핵심 과목</span>으로 압축했습니다.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 mt-3 opacity-90">
                    <p>• 기존 윤리 도서 → <span class="font-bold text-slate-900">[인권]</span> 통합</p>
                    <p>• 평화·통일·환경 → <span class="font-bold text-slate-900">[사회철학]</span> 편입</p>
                    <p>• 문학 장르 → <span class="font-bold text-slate-900">[국어]</span> 분야 공통 검색</p>
                </div>
            </div>
        </div>

        <!-- Category Grid Section -->
        <section class="mb-10">
            <div class="flex items-center gap-2 mb-5">
                <div class="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-widest">8대 지식 분야</h3>
            </div>
            <div class="flex flex-wrap gap-2.5" id="categoryContainer">
                <button onclick="selectCategory('전체', this)" class="category-chip active px-5 py-2.5 rounded-full border border-slate-200 text-sm font-bold">전체 보기</button>
                <button onclick="selectCategory('국어', this)" class="category-chip px-5 py-2.5 rounded-full border border-slate-200 bg-white text-sm font-bold text-slate-500 hover:border-blue-200">국어</button>
                <button onclick="selectCategory('과학', this)" class="category-chip px-5 py-2.5 rounded-full border border-slate-200 bg-white text-sm font-bold text-slate-500 hover:border-blue-200">과학</button>
                <button onclick="selectCategory('수학', this)" class="category-chip px-5 py-2.5 rounded-full border border-slate-200 bg-white text-sm font-bold text-slate-500 hover:border-blue-200">수학</button>
                <button onclick="selectCategory('사회', this)" class="category-chip px-5 py-2.5 rounded-full border border-slate-200 bg-white text-sm font-bold text-slate-500 hover:border-blue-200">사회</button>
                <button onclick="selectCategory('예술', this)" class="category-chip px-5 py-2.5 rounded-full border border-slate-200 bg-white text-sm font-bold text-slate-500 hover:border-blue-200">예술</button>
                <button onclick="selectCategory('역사', this)" class="category-chip px-5 py-2.5 rounded-full border border-slate-200 bg-white text-sm font-bold text-slate-500 hover:border-blue-200">역사</button>
                <button onclick="selectCategory('인권', this)" class="category-chip px-5 py-2.5 rounded-full border border-slate-200 bg-white text-sm font-bold text-slate-500 hover:border-blue-200">인권</button>
                <button onclick="selectCategory('사회철학', this)" class="category-chip px-5 py-2.5 rounded-full border border-slate-200 bg-white text-sm font-bold text-slate-500 hover:border-blue-200">사회철학</button>
            </div>
        </section>

        <!-- Stats -->
        <div class="flex items-center justify-between mb-6 pb-2 border-b border-slate-100">
            <h4 id="resultTitle" class="text-lg font-bold text-slate-800">모든 도서</h4>
            <span class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">총 <span id="bookCount" class="text-blue-600">0</span>권</span>
        </div>

        <!-- Book Results Grid -->
        <div id="bookGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <!-- Dynamic Content -->
        </div>

        <!-- No Results -->
        <div id="noResults" class="hidden text-center py-20 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200">
            <i class="fas fa-book-open text-slate-200 text-5xl mb-4"></i>
            <p class="text-slate-500 font-medium">검색 결과에 맞는 도서가 없습니다.</p>
        </div>
    </main>

    <footer class="p-10 text-center border-t border-slate-50">
        <p class="text-xs font-bold text-slate-300 uppercase tracking-widest">High School Integrated Library</p>
        <p class="text-[11px] text-slate-400 mt-2 font-medium">문해력과 사고력을 키우는 110권의 융합 지식 저장소</p>
    </footer>

            { id: 2, title: "사피엔스", author: "유발 하라리", categories: ["역사", "사회", "과학"], description: "인류의 탄생부터 AI 시대까지의 역사를 거시적인 관점에서 분석한 명저." },
            { id: 3, title: "코스모스", author: "칼 세이건", categories: ["과학", "사회철학"], description: "우주의 광활함과 인류의 존재를 과학적, 철학적으로 연결한 대중서." },

            { id: 611, title: "나의 비거니즘 만화", author: "보선", categories: ["사회철학", "국어"], description: "동물권과 공장식 축산업의 문제를 담담한 에세이 만화로 그려내 성찰을 유도." }

        let currentCategory = '전체';

        function selectCategory(category, element) {
            currentCategory = category;
            const chips = document.querySelectorAll('.category-chip');
            chips.forEach(chip => chip.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('resultTitle').textContent = category === '전체' ? '모든 도서' : `[${category}] 분야`;
            filterBooks();
        }

        function filterBooks() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('bookGrid');
            const noResults = document.getElementById('noResults');
            
            const filtered = initialBooks.filter(book => {
                const matchesCategory = currentCategory === '전체' || book.categories.includes(currentCategory);
                const matchesSearch = book.title.toLowerCase().includes(searchTerm) || 
                                    book.author.toLowerCase().includes(searchTerm) ||
                                    book.description.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });

            document.getElementById('bookCount').textContent = filtered.length;
            grid.innerHTML = '';

            if (filtered.length === 0) {
                noResults.classList.remove('hidden');
                return;
            } else {
                noResults.classList.add('hidden');
            }

            filtered.forEach(book => {
                const isLit = book.categories.includes("국어");
                const card = document.createElement('div');
                card.className = `book-card p-6 bg-white border border-slate-100 rounded-2xl shadow-sm hover:shadow-md flex flex-col ${isLit ? 'is-lit' : ''}`;
                
                const categoriesHtml = book.categories.map(cat => 
                    `<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-slate-50 text-slate-400 border border-slate-100 mr-1">${cat}</span>`
                ).join('');

                card.innerHTML = `
                    <div class="flex flex-wrap gap-1 mb-3">${categoriesHtml}</div>
                    <h5 class="text-base font-bold text-slate-900 mb-1 line-clamp-2">${book.title}</h5>
                    <p class="text-xs text-slate-500 font-medium mb-4"><i class="fas fa-user-edit mr-1.5 opacity-50"></i>${book.author}</p>
                    <div class="mt-auto pt-3 border-t border-slate-50">
                        <p class="text-[13px] text-slate-600 leading-relaxed line-clamp-3 font-medium">${book.description}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = filterBooks;
    </script>
</body>
</html>
